<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Почта подтверждена</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050505;
      color: #ffffff;
    }

    main {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #111111;
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
    }

    p {
      margin: 0;
      color: #cfcfcf;
      font-size: 18px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Почта подтверждена</h1>
    <p>Теперь можно вернуться в приложение «Зерновуха» и войти в аккаунт.</p>
  </main>
</body>
</html>
